# Verificar overlay network antes de deploy

## Action
Antes de ejecutar `docker stack deploy`, verificar que la overlay network
existe y esta accesible desde todos los nodos del cluster:

```bash
docker network ls | grep mi-overlay
docker network inspect mi-overlay
```

Si no existe, crearla con:
```bash
docker network create --driver overlay --attachable mi-overlay
```

## Evidence
- Error detectado 3 veces en sesiones de deploy
- Cada vez el deploy fallaba silenciosamente por network missing
- Solucion siempre era crear/recrear la overlay network
- Ultima observacion: 2026-03-10

